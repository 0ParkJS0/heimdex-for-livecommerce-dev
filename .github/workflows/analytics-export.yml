name: Analytics Export

on:
  schedule:
    # Run daily at 01:00 UTC (10:00 KST)
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Export date (YYYY-MM-DD). Defaults to yesterday."
        required: false

concurrency:
  group: analytics-export
  cancel-in-progress: false

jobs:
  export-staging:
    name: Export staging analytics to S3
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Validate before anything touches a shell: the dispatch input flows into
      # a remote `script:` below, so an unconstrained value would be a command
      # injection vector. Assigning via env (not `${{ }}` in the run body) keeps
      # the check itself injection-safe; empty is allowed (= yesterday).
      - name: Validate date input
        env:
          DATE_INPUT: ${{ github.event.inputs.date }}
        run: |
          if [ -n "$DATE_INPUT" ] && ! printf '%s' "$DATE_INPUT" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "::error::Invalid date input '$DATE_INPUT' - expected YYYY-MM-DD"
            exit 1
          fi
      - name: Run export via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DATE_ARG: ${{ github.event.inputs.date }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ec2-user
          key: ${{ secrets.STAGING_SSH_KEY }}
          # script_stop: true breaks if/else - drone-ssh injects $? checks per-line
          command_timeout: 8m
          # Forward DATE_ARG as a remote env var instead of interpolating
          # `${{ }}` into the script text - the value never becomes shell source.
          envs: DATE_ARG
          script: |
            set -euo pipefail

            APP_DIR=/opt/heimdex/dev-heimdex-for-livecommerce
            DATE_FLAG="${DATE_ARG:+--date $DATE_ARG}"

            cd "$APP_DIR"
            docker compose exec -T api python -m app.cli.export_analytics $DATE_FLAG
            docker compose exec -T api python -m app.cli.export_search_interactions $DATE_FLAG

  export-production:
    name: Export production analytics to S3
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate date input
        env:
          DATE_INPUT: ${{ github.event.inputs.date }}
        run: |
          if [ -n "$DATE_INPUT" ] && ! printf '%s' "$DATE_INPUT" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "::error::Invalid date input '$DATE_INPUT' - expected YYYY-MM-DD"
            exit 1
          fi
      - name: Run export via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DATE_ARG: ${{ github.event.inputs.date }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ec2-user
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          command_timeout: 8m
          # See export-staging: forward as a remote env var, never interpolate.
          envs: DATE_ARG
          script: |
            set -euo pipefail

            APP_DIR=/opt/heimdex/dev-heimdex-for-livecommerce
            DATE_FLAG="${DATE_ARG:+--date $DATE_ARG}"

            cd "$APP_DIR"
            docker compose exec -T api python -m app.cli.export_analytics $DATE_FLAG
            docker compose exec -T api python -m app.cli.export_search_interactions $DATE_FLAG
